<!DOCTYPE html>
<html lang="es-HN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión | Mis Finanzas HN</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1117 0%, #1a1d2d 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 30px;
      background: rgba(30, 35, 55, 0.8);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 10px; color: #fff; }
    p { color: #94a3b8; margin-bottom: 25px; line-height: 1.5; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
    }
    .btn:active { transform: translateY(0); }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      font-size: 0.9rem;
      color: #22c55e;
    }
    .status.offline { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sin Conexión</h1>
    <p>Tus datos están seguros. La app funciona offline y sincronizará automáticamente cuando recuperes la conexión.</p>
    
    <button class="btn" onclick="window.location.reload()">🔄 Reintentar conexión</button>
    
    <div class="status" id="connectionStatus">
      <span>●</span>
      <span id="statusText">Modo offline activo</span>
    </div>
  </div>

  <script>
    // Detectar reconexión automática
    window.addEventListener('online', () => {
      document.getElementById('statusText').textContent = '¡Conexión restaurada! Redirigiendo...';
      document.getElementById('connectionStatus').className = 'status';
      setTimeout(() => window.location.href = './index.html', 1500);
    });

    window.addEventListener('offline', () => {
      document.getElementById('statusText').textContent = 'Modo offline activo';
      document.getElementById('connectionStatus').className = 'status offline';
    });

    // Verificar estado inicial
    if (navigator.onLine) {
      window.location.href = './index.html';
    }
  </script>
</body>
</html>
