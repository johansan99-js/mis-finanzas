<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1117">
  <title>Sin Conexión | Mis Finanzas HN</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { 
      font-family:system-ui,-apple-system,'Space Grotesk',sans-serif; 
      background:#0f1117; color:#f0eff4; 
      display:flex; align-items:center; justify-content:center; 
      min-height:100vh; padding:20px; text-align:center; 
    }
    .card { 
      background:#1a1d27; border:1px solid #2d3147; 
      border-radius:16px; padding:30px 25px; max-width:360px; 
    }
    .icon { font-size:48px; margin-bottom:15px; }
    h1 { font-size:20px; margin-bottom:10px; color:#f0a500; }
    p { color:#9b9eb5; font-size:14px; line-height:1.5; margin-bottom:20px; }
    .btn { 
      width:100%; padding:14px; border-radius:12px; border:none; 
      font-weight:600; cursor:pointer; background:#f0a500; color:#0f1117; 
      margin-bottom:10px; 
    }
    .security-note {
      background:#232736; border-left:3px solid #9b7fe8;
      padding:12px; border-radius:8px; margin-top:20px;
      font-size:12px; color:#9b9eb5; text-align:left;
    }
    .security-note strong { color:#f0a500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin Conexión</h1>
    <p>Tus datos están seguros. La app funciona completamente offline.</p>
    
    <div class="security-note">
      <strong>🔒 Tu privacidad:</strong><br>
      • Los datos nunca salen de tu dispositivo<br>
      • Sin servidores externos<br>
      • Sin rastreo ni analytics
    </div>
    
    <button class="btn" onclick="window.location.href='./index.html'">🔄 Reintentar</button>
  </div>
  
  <script>
    // Auto-reintentar cuando haya conexión
    window.addEventListener('online', () => {
      window.location.href = './index.html';
    });
    
    // Mostrar mensaje si está offline por mucho tiempo
    let offlineTime = 0;
    setInterval(() => {
      offlineTime++;
      if(offlineTime >= 30) {
        document.querySelector('p').innerHTML = 
          'Tu app sigue funcionando offline.<br>Tus datos están seguros en este dispositivo.';
      }
    }, 1000);
  </script>
</body>
</html>
