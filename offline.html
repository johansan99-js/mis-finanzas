<!DOCTYPE html>
<html lang="es-HN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión | Mis Finanzas HN</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}
    .card{background:#1e2337;padding:30px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);max-width:400px;width:100%}
    .icon{font-size:4rem;margin-bottom:16px}
    h1{margin-bottom:8px;font-size:1.5rem}
    p{color:#94a3b8;margin-bottom:20px;line-height:1.5}
    .btn{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-weight:600;cursor:pointer;width:100%}
    .status{margin-top:16px;font-size:0.9rem;color:#22c55e}
    .status.offline{color:#f59e0b}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin Conexión</h1>
    <p>Tus datos están seguros. La app funciona offline y sincronizará cuando recuperes conexión.</p>
    <button class="btn" onclick="location.reload()">🔄 Reintentar</button>
    <div class="status" id="status"><span id="txt">Modo offline activo</span></div>
  </div>
  <script>
    window.addEventListener('online', () => { 
      document.getElementById('txt').textContent = '¡Conexión restaurada!'; 
      document.getElementById('status').className = 'status'; 
      setTimeout(() => location.href = './index.html', 1500); 
    });
    window.addEventListener('offline', () => { 
      document.getElementById('txt').textContent = 'Modo offline activo'; 
      document.getElementById('status').className = 'status offline'; 
    });
    if (navigator.onLine) location.href = './index.html';
  </script>
</body>
</html>
