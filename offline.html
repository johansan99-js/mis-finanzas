<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1117">
  <title>Sin Conexión | Mis Finanzas HN</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { 
      font-family:system-ui,-apple-system,sans-serif; 
      background:#0f1117; color:#f0eff4; 
      display:flex; align-items:center; justify-content:center; 
      min-height:100vh; padding:20px; text-align:center; 
    }
    .card { 
      background:#1a1d27; border:1px solid #2d3147; 
      border-radius:16px; padding:30px 25px; max-width:360px; 
    }
    .icon { font-size:48px; margin-bottom:15px; }
    h1 { font-size:20px; margin-bottom:10px; color:#f0a500; }
    p { color:#9b9eb5; font-size:14px; line-height:1.5; margin-bottom:20px; }
    .btn { 
      width:100%; padding:14px; border-radius:12px; border:none; 
      font-weight:600; cursor:pointer; background:#f0a500; color:#0f1117; 
      margin-bottom:10px; 
    }
    .btn-secondary { background:#232736; color:#f0eff4; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin Conexión</h1>
    <p>Tus datos están seguros. La app funciona offline.</p>
    <button class="btn" onclick="window.location.href='./index.html'">🔄 Reintentar</button>
    <button class="btn btn-secondary" onclick="history.back()">← Volver</button>
  </div>
  <script>
    window.addEventListener('online', () => window.location.href = './index.html');
  </script>
</body>
</html>
