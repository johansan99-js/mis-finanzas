<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#130507">
  <title>Sin Conexión | Mi Pisto HN</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Space Grotesk', sans-serif;
      background: #130507;
      color: #FFF0E8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: #1C080B;
      border: 1px solid #3A1418;
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 360px;
      width: 100%;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatCoin {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%       { transform: translateY(-8px) rotate(2deg); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,200,0,.4); }
      50%       { box-shadow: 0 0 0 14px rgba(245,200,0,.0); }
    }

    .coin-wrap {
      margin-bottom: 20px;
      display: inline-block;
      animation: floatCoin 3.5s ease-in-out infinite;
      filter: drop-shadow(0 6px 16px rgba(140,140,140,.5));
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #FF4444, #F5C800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: #C09090;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .security-note {
      background: #280D10;
      border-left: 3px solid #F5C800;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #C09090;
      text-align: left;
    }

    .security-note strong {
      color: #F5C800;
      display: block;
      margin-bottom: 8px;
    }

    .security-note li {
      list-style: none;
      padding: 3px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .security-note li::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4CAF50;
      flex-shrink: 0;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      background: linear-gradient(135deg, #F5C800, #FF7043);
      color: #130507;
      margin-bottom: 10px;
      animation: pulse 2.5s infinite;
      transition: transform 0.15s;
    }

    .btn:active { transform: scale(0.97); }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FF4444;
      margin-right: 6px;
      animation: blink 1s ease-in-out infinite;
    }

    .status-dot.online { background: #4CAF50; animation: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-bar {
      font-size: 11px;
      color: #C09090;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
  </style>
</head>
<body>

        <ellipse cx="62" cy="54" rx="22" ry="13" fill="white" opacity=".13" transform="rotate(-35 62 54)"/>
      </svg>
    </div>

    <h1>Sin Conexión</h1>
    <p>Tus datos están seguros en este dispositivo.<br>La app funciona 100% offline.</p>

    <div class="security-note">
      <strong>🔒 Tu privacidad garantizada</strong>
      <ul>
        <li>Los datos nunca salen de tu dispositivo</li>
        <li>Sin servidores externos</li>
        <li>Sin rastreo ni analytics</li>
      </ul>
    </div>

    <button class="btn" id="retry-btn" onclick="window.location.href='./index.html'">
      Reintentar conexión
    </button>

    <div class="status-bar">
      <span class="status-dot" id="dot"></span>
      <span id="status-text">Sin conexión</span>
    </div>
  </div>

  <script>
    // Auto-redirigir cuando haya conexión
    window.addEventListener('online', () => {
      document.getElementById('dot').classList.add('online');
      document.getElementById('status-text').textContent = '¡Conexión restaurada! Redirigiendo…';
      setTimeout(() => window.location.href = './index.html', 1200);
    });

    // Actualizar texto del botón con el tiempo transcurrido
    let secs = 0;
    setInterval(() => {
      secs++;
      if (secs >= 60) {
        document.getElementById('status-text').textContent =
          `Offline hace ${Math.floor(secs / 60)} min — tus datos están seguros`;
      }
    }, 1000);
  </script>
</body>
</html>
