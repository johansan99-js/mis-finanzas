<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<title>Mis Finanzas HN - TEST v6.0</title>
<style>
body{font-family:system-ui;background:#0f1117;color:#f0eff4;max-width:430px;margin:0 auto;padding:20px}
.card{background:#1a1d27;border:1px solid #2d3147;border-radius:12px;padding:20px;margin-bottom:15px}
.input{width:100%;padding:12px;background:#232736;border:1px solid #2d3147;border-radius:8px;color:#f0eff4;margin:8px 0}
.btn{width:100%;padding:14px;background:#f0a500;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin:10px 0}
.hidden{display:none}
.log{font-size:11px;color:#9b9eb5;background:#232736;padding:10px;border-radius:6px;margin:10px 0;max-height:150px;overflow-y:auto}
</style>
</head>
<body>

<div id="onboarding">
  <h2>🔧 Modo Diagnóstico</h2>
  <p style="color:#9b9eb5;font-size:14px">Probando persistencia de datos...</p>
  
  <input type="text" id="test-nombre" class="input" placeholder="Tu nombre">
  <input type="number" id="test-salario" class="input" placeholder="Salario (L)">
  
  <button class="btn" onclick="guardarPrueba()">💾 Guardar Datos de Prueba</button>
  <button class="btn" style="background:#232736" onclick="limpiarTodo()">🗑 Limpiar Todo</button>
  
  <div class="log" id="debug-log">📋 Esperando acción...</div>
</div>

<div id="dashboard" class="hidden">
  <div class="card">
    <h3>✅ ¡Datos Cargados!</h3>
    <p><strong>Nombre:</strong> <span id="show-nombre"></span></p>
    <p><strong>Salario:</strong> <span id="show-salario"></span></p>
    <p><strong>Timestamp:</strong> <span id="show-time"></span></p>
  </div>
  
  <button class="btn" onclick="agregarGasto()">+ Agregar Gasto de Prueba</button>
  <button class="btn" style="background:#232736" onclick="reiniciarApp()">🔄 Reiniciar App</button>
  
  <div class="log" id="dashboard-log"></div>
</div>

<script>
// === CONFIGURACIÓN ===
const LS_KEY = 'finanzas_test_v6';
const log = (msg, el = 'debug-log') => {
  const time = new Date().toLocaleTimeString();
  document.getElementById(el).innerHTML += `<div>[${time}] ${msg}</div>`;
  console.log(`[TEST] ${msg}`);
};

// === TEST DE LOCALSTORAGE ===
function testLocalStorage() {
  try {
    localStorage.setItem('_test_', 'ok');
    if (localStorage.getItem('_test_') === 'ok') {
      localStorage.removeItem('_test_');
      log('✅ localStorage: FUNCIONA');
      return true;
    } else {
      log('❌ localStorage: No retorna valor correcto');
      return false;
    }
  } catch(e) {
    log('❌ localStorage: ERROR - ' + e.message);
    return false;
  }
}

// === GUARDAR DATOS ===
function guardarPrueba() {
  const nombre = document.getElementById('test-nombre').value.trim();
  const salario = parseFloat(document.getElementById('test-salario').value);
  
  if (!nombre || !salario) return log('⚠️ Completa nombre y salario');
  
  const data = {
    nombre,
    salario,
    timestamp: new Date().toISOString(),
    version: 'v6.0-test',
    gastos: []
  };
  
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(data));
    log('💾 Datos guardados: ' + JSON.stringify(data));
    log('🔄 Recargando para verificar persistencia...');
    
    setTimeout(() => {
      location.reload();
    }, 1500);
  } catch(e) {
    log('❌ Error al guardar: ' + e.message);
  }
}

// === CARGAR DATOS ===
function cargarDatos() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      document.getElementById('show-nombre').textContent = data.nombre;
      document.getElementById('show-salario').textContent = 'L. ' + data.salario.toLocaleString();
      document.getElementById('show-time').textContent = new Date(data.timestamp).toLocaleString();
      
      log('📦 Datos cargados desde localStorage', 'dashboard-log');
      log('🔑 Clave usada: ' + LS_KEY, 'dashboard-log');
      log('📦 Contenido crudo: ' + saved.substring(0, 100) + '...', 'dashboard-log');
      
      document.getElementById('onboarding').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      return true;
    } else {
      log('📭 Sin datos previos en localStorage');
      return false;
    }
  } catch(e) {
    log('❌ Error al cargar: ' + e.message, 'dashboard-log');
    return false;
  }
}

// === AGREGAR GASTO DE PRUEBA ===
function agregarGasto() {
  try {
    const data = JSON.parse(localStorage.getItem(LS_KEY));
    data.gastos.push({
      id: Date.now(),
      monto: Math.floor(Math.random() * 500) + 50,
      fecha: new Date().toISOString()
    });
    localStorage.setItem(LS_KEY, JSON.stringify(data));
    log('➕ Gasto agregado. Total gastos: ' + data.gastos.length, 'dashboard-log');
    log('💾 Guardado exitoso', 'dashboard-log');
  } catch(e) {
    log('❌ Error: ' + e.message, 'dashboard-log');
  }
}

// === LIMPIAR / REINICIAR ===
function limpiarTodo() {
  if (confirm('¿Borrar datos de prueba?')) {
    localStorage.removeItem(LS_KEY);
    log('🗑 Datos eliminados. Recargando...');
    setTimeout(() => location.reload(), 1000);
  }
}

function reiniciarApp() {
  if (confirm('¿Reiniciar completamente?')) {
    localStorage.clear();
    log('🔄 Limpieza total. Recargando...');
    setTimeout(() => location.reload(), 1000);
  }
}

// === INICIALIZACIÓN ===
window.onload = () => {
  log('🚀 App iniciada - TEST v6.0');
  
  // Test crítico
  const storageOk = testLocalStorage();
  if (!storageOk) {
    log('⚠️ localStorage no funciona. Revisa configuración del navegador.');
  }
  
  // Intentar cargar datos existentes
  const loaded = cargarDatos();
  if (!loaded) {
    log('👉 Ingresa datos y haz clic en "Guardar" para probar persistencia');
  }
  
  // Exponer para debug en consola
  window.testData = () => JSON.parse(localStorage.getItem(LS_KEY));
  window.rawStorage = () => localStorage.getItem(LS_KEY);
  log('🔧 Consola: usa window.testData() o window.rawStorage() para inspeccionar');
};
</script>
</body>
</html>
